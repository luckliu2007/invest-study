name: CI

on:
  schedule:
    - cron: '0 1 * * *'   # 每天 01:00 UTC（北京时间 09:00）
  workflow_dispatch:
  push:
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'requirements-ci.txt'
      - 'requirements-test.txt'
      - '.github/workflows/backtest.yml'
  pull_request:
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'requirements-test.txt'
      - '.github/workflows/backtest.yml'

jobs:
  # 快速单元测试：只装轻量依赖，必须通过。覆盖脚本核心逻辑与降级路径。
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
      - name: Run unit tests
        run: pytest tests/ -v

  # 冒烟运行：装完整 CI 依赖跑三个脚本，产出 reports/ 作为 artifact。
  # 重依赖（pyportfolioopt 等）安装失败时脚本自带降级路径，不应阻塞。
  smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps (best-effort)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt || pip install -r requirements-test.txt
      - name: Run screening & optimization & tracker
        run: |
          python scripts/sector_screening.py
          python scripts/optimize_portfolio.py
          python scripts/fund_raise_tracker.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-reports
          path: reports/
          if-no-files-found: error
