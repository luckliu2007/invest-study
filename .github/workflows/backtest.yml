name: Daily Backtest

on:
  schedule:
    - cron: '0 1 * * *'   # 每天 01:00 UTC（北京时间 09:00）
  workflow_dispatch:
  push:
    paths:
      - 'scripts/**'
      - 'requirements-ci.txt'
      - '.github/workflows/backtest.yml'

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
      - name: Run screening & optimization
        run: |
          python scripts/sector_screening.py
          python scripts/optimize_portfolio.py
      - name: Build fund tracker
        run: |
          python scripts/fund_raise_tracker.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-reports
          path: reports/
          if-no-files-found: error
